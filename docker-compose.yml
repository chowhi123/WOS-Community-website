version: '3.8'

networks:
  default:
  proxy-tier:
    external: true

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-BNYRCY3tqoASLrAxgxtYWzZWhqwE2AcwYwIRLIpFXoABafZtGzqY612ankX7LJT2AuLxtbDLJkUfRVl5MX9-5bw}
        NEXT_PUBLIC_TZ: ${NEXT_PUBLIC_TZ:-Asia/Seoul}
    restart: always
    ports:
      - "3000:3000"
    environment:
      # These should be overridden by Portainer or a single production .env
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-wos_community}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-changeme_in_production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-BNYRCY3tqoASLrAxgxtYWzZWhqwE2AcwYwIRLIpFXoABafZtGzqY612ankX7LJT2AuLxtbDLJkUfRVl5MX9-5bw}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-UqFQ19sleTaD0Oi7gLDCRynwoCu0gOwO8fvbKfFEsCo}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@woscommunity.com}
      - NEXT_PUBLIC_TZ=${NEXT_PUBLIC_TZ:-Asia/Seoul}
    networks:
      - default
      - proxy-tier
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      - db
    # Removed volume mount for code to ensure production image is used
    # volumes:
    #   - ./web:/app
    #   - /app/node_modules

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-wos_community}
    # Removed ports mapping to prevent external access
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

volumes:
  postgres_data:
  uploads_data:
